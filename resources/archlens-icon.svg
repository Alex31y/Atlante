<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Lens/magnifying circle -->
  <circle cx="11" cy="11" r="7" stroke="#C5C5C5" stroke-width="1.5" fill="none"/>
  <!-- Architecture: layered blocks inside lens -->
  <rect x="8" y="13" width="6" height="2" rx="0.5" stroke="#C5C5C5" stroke-width="1.2" fill="none"/>
  <rect x="9" y="10" width="4" height="2" rx="0.5" stroke="#C5C5C5" stroke-width="1.2" fill="none"/>
  <rect x="10" y="7" width="2" height="2" rx="0.5" stroke="#C5C5C5" stroke-width="1.2" fill="none"/>
  <!-- Lens handle -->
  <line x1="16" y1="16" x2="20" y2="20" stroke="#C5C5C5" stroke-width="1.5" stroke-linecap="round"/>
</svg>
